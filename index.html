<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WW2 Interactive Map</title>
    <link rel="preload" href="https://raw.githubusercontent.com/aourednik/historical-basemaps/master/geojson/world_1938.geojson" as="fetch" crossorigin>
    <link rel="preload" href="https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_50m_rivers_lake_centerlines.geojson" as="fetch" crossorigin>
    <link rel="preload" href="https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_50m_lakes.geojson" as="fetch" crossorigin>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <svg id="map-svg"></svg>
    <div id="tooltip"></div>
    <div id="onboarding">
        <div id="onboarding-card">
            <span id="onboarding-close">×</span>
            <h2>WW2 Interactive Map</h2>
            <p>Explore key battles of the Second World War on a 1938-era map. Click any red marker to see battle details. Scroll or pinch to zoom in for cities and country labels.</p>
            <button id="onboarding-dismiss">Got it</button>
        </div>
    </div>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="index.js"></script>
</body>
</html>
